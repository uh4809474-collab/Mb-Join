<!DOCTYPE html>
<html lang="en">

<head>
  <title>Welcome — IVIBET</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/popup.css">
  <script src="assets/popup.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      PopupLander(); // only for lander.html
    });
  </script>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: url("assets/img/lap.png") no-repeat center center;
      background-size: cover;
    }

    /* Mobile (max 600px) */
    @media (max-width: 600px) {
      body {
        background: url("assets/img/mob.png") no-repeat center center;
        background-size: cover;
      }
    }

    /* Tablet (601px – 1024px) */
    @media (min-width: 601px) and (max-width: 1024px) {
      body {
        background-image: url("assets/img/lap.png");
      }
    }

    /* Desktop (above 1024px) */
    @media (min-width: 1025px) {
      body {
        background-image: url("assets/img/lap.png");
      }
    }
  </style>

</head>

</body>

</html>
